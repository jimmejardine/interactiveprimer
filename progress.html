<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Progress — Interactive Primer</title>
    <meta
      name="description"
      content="Your learning dashboard — track your confidence across a course: mastery, streaks, what's ready to learn next, and what's due for review."
    />
    <link rel="icon" href="/images/icons/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/images/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/images/icons/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/images/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#f8f4ec" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="InteractivePrimer.com" />
    <link rel="canonical" href="https://interactiveprimer.com/progress.html" />

    <!-- Set the theme synchronously, before the stylesheet, so there is no flash (mirrors js/theme.js). -->
    <script>
      (function () {
        var t = null;
        try { t = localStorage.getItem("primer:theme"); } catch (e) {}
        if (t !== "light" && t !== "dark" && t !== "fun") {
          t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.dataset.theme = t;
        var tc = document.querySelector('meta[name="theme-color"]');
        if (tc) tc.setAttribute("content", t === "dark" ? "#14171f" : t === "fun" ? "#fff7fb" : "#f8f4ec");
      })();
    </script>
    <!-- Set the locale synchronously too (mirrors js/i18n.js); initLocale() re-applies after load. -->
    <script>
      (function () {
        var SUPPORTED = ["en", "es"];
        var l = "";
        try {
          var q = (new URLSearchParams(location.search).get("lang") || "").toLowerCase();
          if (SUPPORTED.indexOf(q) !== -1) { l = q; try { localStorage.setItem("primer:locale", l); } catch (e) {} }
        } catch (e) {}
        if (!l) { try { l = localStorage.getItem("primer:locale") || ""; } catch (e) {} }
        if (SUPPORTED.indexOf(l) === -1) {
          var langs = (navigator.languages && navigator.languages.length) ? navigator.languages : [navigator.language || "en"];
          l = "en";
          for (var i = 0; i < langs.length; i++) {
            var base = String(langs[i] || "").toLowerCase().split("-")[0];
            if (SUPPORTED.indexOf(base) !== -1) { l = base; break; }
          }
        }
        document.documentElement.lang = l;
      })();
    </script>
    <link rel="stylesheet" href="/css/primer.css" />
    <script src="/js/analytics.js" defer></script>
    <!-- No boot.js here, so supply the bare specifiers the concept-graph dependency tree uses
         (KaTeX for math titles, json5 for concept-meta parsing, the "primer" barrel, jsxgraph).
         Mirrors the import map in js/boot.js — keep versions in step. -->
    <link rel="stylesheet" href="/3rdparty/katex/katex.min.css" />
    <script type="importmap">
      {
        "imports": {
          "katex": "/3rdparty/katex/katex.mjs",
          "json5": "/3rdparty/json5/index.min.mjs",
          "jsxgraph": "/3rdparty/jsxgraph/jsxgraphcore.mjs",
          "primer": "/js/primer.js"
        }
      }
    </script>

    <style>
      body { margin: 0; background: var(--primer-bg, #fff); color: var(--primer-ink, #222); }
      /* The embedded constellation brings the explorer's viewport-pinned search stack; the dashboard
         has its own course switcher, so hide the graph's fixed chrome. */
      .cg-search-stack { display: none !important; }
      .dash { max-width: 68rem; margin: 0 auto; padding: 1.4rem 1.1rem 5rem; }
      .dash-head { margin-bottom: 1rem; }
      /* Raise the button so its bottom edge lines up with the course-name text baseline (the overflow
         baseline trick doesn't apply to <button>). Value = the button's descent + bottom padding + border. */
      .exit-course-btn { display: inline-block; margin-left: 0.5rem; vertical-align: 0.42rem; padding: 0.3rem 0.75rem; border-radius: 999px; white-space: nowrap;
        border: 1px solid var(--primer-star, #e3b15c); background: var(--primer-star, #e3b15c);
        color: #33280a; font-family: var(--primer-font-ui, sans-serif); font-size: 0.85rem; font-weight: 500;
        cursor: pointer; transition: filter 0.12s, box-shadow 0.12s; }
      .exit-course-btn:hover { filter: brightness(1.06); box-shadow: var(--primer-shadow-sm); }
      .dash-title { font-family: var(--primer-font-display, serif); font-size: clamp(1.8rem, 4vw, 2.6rem); margin: 0 0 0.25rem; }
      /* The active course name trails "My Progress" on the same line, in the same header font. */
      .dash-course { font: inherit; color: inherit; }
      .dash-sub { color: var(--primer-ink-soft, #667); margin: 0; font-family: var(--primer-font-ui, sans-serif); }
      .dash, .dash button, .dash a { font-family: var(--primer-font-ui, sans-serif); }
      .card { background: var(--primer-surface, #fff); border: 1px solid var(--primer-border, #ddd);
              border-radius: var(--primer-radius, 0.85rem); box-shadow: var(--primer-shadow-sm); padding: 1rem 1.15rem; }
      .card-head { display: flex; align-items: baseline; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.5rem; }
      .card-head h2 { font-size: 1.05rem; margin: 0; }
      .muted { color: var(--primer-ink-soft, #778); }
      .small { font-size: 0.85rem; }

      /* course switcher */
      .switcher { display: flex; flex-direction: column; gap: 0.7rem; margin-bottom: 1.2rem; }
      /* All matching courses on one line; a horizontal scrollbar appears automatically on overflow. */
      /* Search box (fixed) + chips strip on one line; only the strip scrolls, so the search popup isn't clipped. */
      .switcher-row { display: flex; align-items: center; gap: 0.6rem; }
      .course-chips-row { flex: 1 1 auto; min-width: 0; display: flex; flex-wrap: nowrap; align-items: center; gap: 0.5rem; overflow-x: auto; padding: 0.15rem 0 0.5rem; scrollbar-width: thin; }
      .chip { flex: 0 0 auto; display: inline-flex; align-items: center; gap: 0.45rem; padding: 0.3rem 0.7rem 0.3rem 0.4rem;
              border: 1px solid var(--primer-border, #ddd); border-radius: 999px; background: var(--primer-surface, #fff);
              color: var(--primer-ink, #222); cursor: pointer; transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s; }
      .chip:hover { transform: translateY(-1px); box-shadow: var(--primer-shadow-sm); }
      .chip.is-active { border-color: var(--primer-accent, #6a5cff); box-shadow: 0 0 0 2px var(--primer-ring, #6a5cff44); }
      .search-host { flex: 0 0 auto; }

      /* living constellation */
      .constellation-wrap { margin-bottom: 1.2rem; }
      .constellation-cap { text-align: center; margin: 0 0 0.5rem; color: var(--primer-ink, #222); font-size: 1.05rem; }
      .constellation { position: relative; overflow: hidden; height: 62vh; min-height: 340px;
                       border: 1px solid var(--primer-border, #ddd); border-radius: var(--primer-radius, 0.85rem);
                       background: var(--primer-viz-bg, var(--primer-surface, #fff)); }

      /* stat tiles */
      .tiles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.2rem; }
      .tile { background: var(--primer-surface, #fff); border: 1px solid var(--primer-border, #ddd);
              border-radius: var(--primer-radius, 0.85rem); box-shadow: var(--primer-shadow-sm);
              padding: 1rem; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.35rem; text-align: center; }
      .tile-num { font-size: 1.9rem; font-weight: 700; font-family: var(--primer-font-display, serif); line-height: 1; }
      .tile-of { font-size: 1rem; color: var(--primer-ink-soft, #778); font-weight: 400; }
      .tile-label { color: var(--primer-ink-soft, #778); font-size: 0.85rem; }
      .tile-sub { color: var(--primer-ink-soft, #778); font-size: 0.78rem; }
      .ring { display: block; }
      .ring-text { font-family: var(--primer-font-display, serif); font-weight: 700; font-size: 1.5rem; fill: var(--primer-ink, #222); }
      .ring circle:last-of-type { transition: stroke-dashoffset 0.9s ease; }
      .meter { width: 100%; height: 0.5rem; border-radius: 999px; background: var(--primer-control-bg, #0001); overflow: hidden; }
      .meter > span { display: block; height: 100%; background: var(--primer-accent, #6a5cff); transition: width 0.9s ease; }
      .tile-counts { align-items: stretch; }
      .count-pill { display: flex; justify-content: space-between; gap: 0.5rem; font-size: 0.82rem; padding: 0.1rem 0.1rem; color: var(--st, var(--primer-ink)); }
      .count-pill b { color: var(--primer-ink, #222); }

      /* status colours (shared by pills, list chips) */
      [data-status="locked"]     { --st: var(--primer-ink-soft, #889); }
      [data-status="ready"]      { --st: var(--primer-accent, #6a5cff); }
      [data-status="learning"]   { --st: hsl(42, 85%, 42%); }
      [data-status="mastered"]   { --st: var(--primer-ok, hsl(145, 55%, 38%)); }
      [data-status="review-due"] { --st: var(--primer-course, #cf922f); }

      /* activity heatmap */
      /* The grid fits the container width (columns capped at 12px, shrinking on narrow screens) so the most
         recent activity is always visible — no horizontal scroll on mobile. Columns are set inline per WEEKS. */
      .hm-grid { display: grid; grid-auto-flow: column; grid-template-rows: repeat(7, auto); gap: 2px; width: 100%; padding-bottom: 0.3rem; }
      .hm-cell { width: 100%; aspect-ratio: 1 / 1; border-radius: 2px; background: var(--primer-control-bg, #0000000d); }
      .hm-cell[data-level="1"] { background: color-mix(in srgb, var(--primer-accent, #6a5cff) 30%, transparent); }
      .hm-cell[data-level="2"] { background: color-mix(in srgb, var(--primer-accent, #6a5cff) 55%, transparent); }
      .hm-cell[data-level="3"] { background: color-mix(in srgb, var(--primer-accent, #6a5cff) 78%, transparent); }
      .hm-cell[data-level="4"] { background: var(--primer-accent, #6a5cff); }
      .hm-legend { display: flex; align-items: center; gap: 4px; margin-top: 0.5rem; font-size: 0.78rem; }
      .hm-legend .hm-cell { width: 11px; height: 11px; }

      /* frontier / reviews / next-up panels */
      .panels { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 1.2rem 0; }
      .panel h2 { font-size: 1rem; }
      .p-item { display: flex; align-items: center; justify-content: space-between; gap: 0.6rem;
                padding: 0.45rem 0.55rem; border-radius: 0.5rem; text-decoration: none; color: var(--primer-ink, #222);
                border: 1px solid transparent; }
      .p-item:hover { background: var(--primer-control-bg, #0000000a); border-color: var(--primer-border, #ddd); }
      .p-badge { flex: none; font-size: 0.74rem; color: var(--primer-ink-soft, #778); background: var(--primer-control-bg, #0000000a);
                 padding: 0.1rem 0.45rem; border-radius: 999px; }
      .p-next-cta { display: inline-block; margin-top: 0.4rem; padding: 0.55rem 0.9rem; border-radius: 0.6rem;
                    background: var(--primer-accent, #6a5cff); color: var(--primer-accent-ink, #fff); text-decoration: none;
                    font-weight: 600; transition: transform 0.12s, box-shadow 0.12s; }
      .p-next-cta:hover { transform: translateY(-1px); box-shadow: var(--primer-shadow-md); }

      /* concept list */
      .row { display: grid; grid-template-columns: minmax(9rem, 1.7fr) minmax(7rem, 1fr) 6.5rem 6rem 6rem;
             gap: 0.6rem; align-items: center; padding: 0.4rem 0.3rem; border-bottom: 1px solid var(--primer-border, #eee); }
      .row:last-child { border-bottom: 0; }
      .row-head { color: var(--primer-ink-soft, #778); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; }
      .row-title { text-decoration: none; color: var(--primer-ink, #222); font-weight: 500; }
      .row-title:hover { text-decoration: underline; }
      .row-stars { letter-spacing: 1px; white-space: nowrap; font-size: 0.9rem; }
      .row-stars .s { color: var(--primer-control-bg, #8883); }
      .row-stars .s.on { color: var(--primer-star, #e3b15c); }
      .row-date { color: var(--primer-ink-soft, #889); font-size: 0.8rem; }
      .status { font-size: 0.74rem; padding: 0.12rem 0.5rem; border-radius: 999px; color: var(--st); border: 1px solid var(--st); white-space: nowrap; }

      .empty-state { text-align: center; padding: 2rem 1.4rem; }
      .empty-state h2 { margin-top: 0; }

      @media (max-width: 52rem) {
        .tiles { grid-template-columns: repeat(2, 1fr); }
        .panels { grid-template-columns: 1fr; }
      }
      @media (max-width: 40rem) {
        .row { grid-template-columns: 1fr auto; row-gap: 0.2rem; }
        .row-stars { grid-column: 1; } .row-status { grid-column: 2; grid-row: 1; justify-self: end; }
        .row-date { display: none; }
        .row-head { display: none; }
      }
      @media (prefers-reduced-motion: reduce) {
        .chip, .meter > span, .ring circle:last-of-type { transition: none; }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to main content</a>
    <main class="dash" id="main" tabindex="-1">
      <div id="dash"><p class="muted" role="status" aria-live="polite" style="padding:2rem 0;text-align:center">Loading your progress…</p></div>
    </main>

    <script type="module">
      import { initTheme } from "/js/theme.js";
      import { initLocale } from "/js/i18n.js";
      import "/js/components/primer-menu.js";
      import { loadGraph } from "/js/graph-data.js";
      import { runProgressMigration } from "/js/progress-migration.js";
      import { mountProgressDashboard } from "/js/progress-dashboard.js";

      initTheme();
      initLocale();
      document.body.appendChild(document.createElement("primer-menu"));

      const root = document.getElementById("dash");
      try {
        await runProgressMigration();
        const { byId } = await loadGraph();
        mountProgressDashboard(root, { byId });
      } catch (e) {
        console.error(e);
        root.innerHTML =
          '<p class="muted" style="padding:2rem 0;text-align:center">Could not load your progress. ' +
          '<a href="/concepts.html">Explore the tree</a> instead.</p>';
      }
    </script>
  </body>
</html>
