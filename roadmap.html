<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Roadmap — Interactive Primer</title>
    <meta name="description" content="Planned topics for the Interactive Primer — the roadmap of concepts we intend to teach." />
    <link rel="icon" href="/images/favicon.ico" sizes="any" />

    <!-- Set the theme synchronously before the stylesheet (no flash). Mirrors pickInitialTheme(). -->
    <script>
      (function () {
        var t = null;
        try { t = localStorage.getItem("primer:theme"); } catch (e) {}
        if (t !== "light" && t !== "dark" && t !== "fun") {
          t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.dataset.theme = t;
      })();
    </script>
    <link rel="stylesheet" href="/css/primer.css" />

    <style>
      .doc-shell { max-width: 56rem; margin: 0 auto; padding: 1.25rem 1.1rem 4rem; }
      .doc-nav { font-family: var(--primer-font-ui, sans-serif); font-size: 0.95rem; margin-bottom: 1rem; }
      .doc-nav a { color: var(--primer-accent, #5b6ee1); text-decoration: none; }
      .doc-nav a:hover { text-decoration: underline; }

      .doc {
        background: var(--primer-surface, #fff);
        border: 1px solid var(--primer-border, #e6e0d4);
        border-radius: var(--primer-radius, 0.6rem);
        padding: 1.5rem 1.9rem;
        font-family: var(--primer-font-body, Georgia, serif);
        color: var(--primer-ink, #1f2430);
        line-height: 1.55;
      }
      .doc h1, .doc h2, .doc h3, .doc h4 {
        font-family: var(--primer-font-display, sans-serif);
        color: var(--primer-ink, #1f2430);
        line-height: 1.25;
      }
      .doc h1 { font-size: 1.8rem; margin: 0 0 0.5rem; }
      .doc h2 { font-size: 1.35rem; margin: 1.7rem 0 0.5rem; border-bottom: 1px solid var(--primer-border, #e6e0d4); padding-bottom: 0.25rem; }
      .doc h3 { font-size: 1.12rem; margin: 1.1rem 0 0.35rem; }
      .doc h4 { font-size: 1rem; margin: 0.9rem 0 0.3rem; color: var(--primer-ink-soft, #55606f); }
      .doc p { margin: 0.55rem 0; }
      .doc a { color: var(--primer-accent, #5b6ee1); }
      .doc ul { margin: 0.3rem 0; padding-left: 1.35rem; }
      .doc li { margin: 0.14rem 0; }
      .doc hr { border: 0; border-top: 1px solid var(--primer-border, #e6e0d4); margin: 1.5rem 0; }
      .doc code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 0.88em;
        background: var(--primer-bg, #faf7f0); border: 1px solid var(--primer-border, #e6e0d4);
        border-radius: 0.3rem; padding: 0.03rem 0.32rem;
      }
      .doc .meta { color: var(--primer-ink-soft, #55606f); }
    </style>
    <script src="/js/analytics.js" defer></script>
  </head>
  <body>
    <main class="doc-shell">
      <nav class="doc-nav"><a href="/concepts/root.html">← Back to the tree</a></nav>
      <article class="doc" id="doc"><p class="meta">Loading…</p></article>
    </main>

    <!-- Standalone page (no boot.js): render the markdown roadmap, then mount theme/language chrome. -->
    <script type="module">
      import { renderMarkdown } from "/js/markdown.js";
      import { initTheme } from "/js/theme.js";
      import { initLocale } from "/js/i18n.js";
      import "/js/components/primer-menu.js";

      initTheme();
      initLocale();
      document.body.appendChild(document.createElement("primer-menu"));

      // Whitelisted roadmaps → clean URLs like /roadmap.html?doc=mathematics (no open fetch).
      // Mathematics, Physics and Computer Science are all fully built out, so their roadmaps have
      // been retired; no roadmaps remain.
      const DOCS = {};

      const host = document.getElementById("doc");
      const key = new URLSearchParams(location.search).get("doc") ?? "";
      const entry = DOCS[key];

      if (!entry) {
        const links = Object.entries(DOCS)
          .map(([k, v]) => `<li><a href="/roadmap.html?doc=${k}">${v.title}</a></li>`)
          .join("");
        host.innerHTML = `<h1>Roadmaps</h1><p>Pick a roadmap to view:</p><ul>${links}</ul>`;
      } else {
        document.title = `${entry.title} — Interactive Primer`;
        fetch(entry.path)
          .then((r) => {
            if (!r.ok) throw new Error(`${r.status}`);
            return r.text();
          })
          .then((md) => {
            host.innerHTML = renderMarkdown(md);
          })
          .catch((err) => {
            host.innerHTML = `<h1>${entry.title}</h1><p class="meta">Sorry — couldn't load this roadmap (${String(err)}).</p>`;
          });
      }
    </script>
  </body>
</html>
