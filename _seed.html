<!doctype html><body><script type="module">
const g = await (await fetch("/dist/graph.json")).json();
const C="mathematics/complex-analysis/complex-analysis";
const memb=(g.concepts.find(c=>c.id===C).courseMembers||[]).slice(1);
const now=Date.now(); const iso=d=>new Date(now-d*86400000).toISOString();
// master the first 4, put the 5th mid-learning; rest untouched
memb.slice(0,4).forEach((id,i)=>localStorage.setItem("primer:confidence:"+id,JSON.stringify([9,iso(30).slice(0,10),iso(3+i)])));
if(memb[4]) localStorage.setItem("primer:confidence:"+memb[4],JSON.stringify([4,iso(10).slice(0,10),iso(1)]));
localStorage.setItem("primer:course",C); localStorage.setItem("primer:theme","light");
document.body.textContent="seeded";
</script></body>
