<!doctype html>
<html lang="en">
  <body>
    <script src="/js/boot.js"></script>

    <script type="application/json" class="concept-meta">
      {
        "id": "arithmetic/addition",
        "title": "Addition",
        "prerequisites": ["arithmetic/counting"]
      }
    </script>

    <primer-card>
      <p>
        Addition combines two amounts into one total. If you have
        <primer-math>a</primer-math> things and <primer-math>b</primer-math>
        more, you have:
      </p>
      <primer-math display>a + b = c</primer-math>
      <p>
        One way to picture it is to start at <primer-math>a</primer-math> on a
        number line and take <primer-math>b</primer-math> steps to the right:
      </p>
      <primer-manim
        scene="addNumberLine"
        caption="Counting on from a to a + b"
      ></primer-manim>
    </primer-card>

    <primer-card>
      <h2>Test yourself</h2>
      <primer-quiz count="3">
        <script type="application/json">
          [
            {
              "prompt": "What is $2 + 3$?",
              "options": [
                { "text": "$4$", "correct": false },
                { "text": "$5$", "correct": true },
                { "text": "$6$", "correct": false },
                { "text": "$23$", "correct": false }
              ]
            },
            {
              "prompt": "If you have 4 apples and pick up 2 more, how many do you have?",
              "options": [
                { "text": "$2$", "correct": false },
                { "text": "$6$", "correct": true },
                { "text": "$8$", "correct": false }
              ]
            },
            {
              "prompt": "Which sum equals $10$?",
              "options": [
                { "text": "$6 + 3$", "correct": false },
                { "text": "$7 + 3$", "correct": true },
                { "text": "$5 + 4$", "correct": false }
              ]
            },
            {
              "prompt": "Adding $0$ to a number gives…",
              "options": [
                { "text": "the same number", "correct": true },
                { "text": "zero", "correct": false },
                { "text": "one more", "correct": false }
              ]
            }
          ]
        </script>
      </primer-quiz>
    </primer-card>

    <!-- A small manim-web scene, referenced by <primer-manim scene="addNumberLine">.
         The bare "primer" import resolves against the import map boot.js injected
         (boot.js is first in the body, so the map is already present). -->
    <script type="module">
      import { registerScene } from "primer";

      registerScene("addNumberLine", async (host, manim) => {
        const { Scene, Circle, Create } = manim;
        const scene = new Scene(host);
        const dot = new Circle();
        await scene.play(new Create(dot));
      });
    </script>
  </body>
</html>
