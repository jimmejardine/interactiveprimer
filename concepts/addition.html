<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Addition — Interactive Primer</title>

    <link rel="stylesheet" href="/css/primer.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
    />

    <script type="importmap">
      {
        "imports": {
          "katex": "https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.mjs",
          "manim-web": "https://cdn.jsdelivr.net/npm/manim-web@0.3.18/dist/manim-web.browser.js",
          "primer": "/js/primer.js"
        }
      }
    </script>

    <script type="module">
      import { registerScene } from "primer";

      // A small manim-web scene, referenced by <primer-manim scene="addNumberLine">.
      // Written against manim-web's documented API; if the library can't run it the
      // <primer-manim> component shows a clear inline message instead of breaking.
      registerScene("addNumberLine", async (host, manim) => {
        const { Scene, Circle, Create } = manim;
        const scene = new Scene(host);
        const dot = new Circle();
        await scene.play(new Create(dot));
      });
    </script>
    <script type="module">
      import "primer";
    </script>
  </head>
  <body>
    <main class="primer-shell">
      <!-- This page declares no level of its own; it inherits "early-school"
           from its prerequisite, Counting, via the rules in js/graph.js. -->
      <primer-page subject="Mathematics" prerequisites="counting">
        <primer-concept title="Addition" concept-id="addition">
          <p>
            Addition combines two amounts into one total. If you have
            <primer-math>a</primer-math> things and <primer-math>b</primer-math>
            more, you have:
          </p>
          <primer-math display>a + b = c</primer-math>
          <p>
            One way to picture it is to start at <primer-math>a</primer-math> on a
            number line and take <primer-math>b</primer-math> steps to the right:
          </p>

          <primer-manim
            scene="addNumberLine"
            caption="Counting on from a to a + b"
          ></primer-manim>

          <h2>Test yourself</h2>
          <primer-quiz src="/concepts/addition.quiz.json" count="3"></primer-quiz>
        </primer-concept>
      </primer-page>
    </main>
  </body>
</html>
