# CI — proves the repo is healthy on every push/PR: the full check gate (typecheck + unit tests +
# graph validation + i18n) and a production build. Deployment is NOT done here — Cloudflare Pages
# builds and serves the site itself (see docs/deploy.md); this workflow only backs the README badge.
name: checks
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
