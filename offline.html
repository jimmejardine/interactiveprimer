<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — Interactive Primer</title>
    <meta
      name="description"
      content="Manage the courses you've downloaded for offline use — download more, see storage, and remove ones you no longer need."
    />
    <link rel="icon" href="/images/icons/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/images/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/images/icons/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/images/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#f8f4ec" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="InteractivePrimer.com" />
    <link rel="canonical" href="https://interactiveprimer.com/offline" />

<!-- Shared synchronous pre-paint: theme + locale, before the stylesheet (built from src/prepaint.ts). -->
    <script src="/dist/prepaint.js"></script>
    <link rel="stylesheet" href="/dist/assets/stix.css" />
    <link rel="stylesheet" href="/css/primer.css" />
    <script src="/dist/analytics.js" defer></script>
    <!-- KaTeX glyph CSS for course titles that carry math. Framework JS + deps come from the built
         app bundle, imported below via the asset manifest. -->
    <link rel="stylesheet" href="/dist/assets/katex.min.css" />

    <style>
      /* Shares course.html's dashboard look-and-feel (.dash / .card / .muted). */
      body { margin: 0; background: var(--primer-bg, #fff); color: var(--primer-ink, #222); }
      .dash { max-width: 60rem; margin: 0 auto; padding: 1.4rem 1.1rem 5rem; }
      .dash, .dash button, .dash a { font-family: var(--primer-font-ui, sans-serif); }
      .dash-head { margin-bottom: 1.2rem; }
      .dash-title { font-family: var(--primer-font-display, serif); font-size: clamp(1.8rem, 4vw, 2.6rem); margin: 0 0 0.25rem; }
      .dash-sub { color: var(--primer-ink-soft, #667); margin: 0; }
      .card { background: var(--primer-surface, #fff); border: 1px solid var(--primer-border, #ddd);
              border-radius: var(--primer-radius, 0.85rem); box-shadow: var(--primer-shadow-sm);
              padding: 1rem 1.15rem; margin-bottom: 1.2rem; }
      .card-head { display: flex; align-items: baseline; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.6rem; }
      .card-head h2 { font-size: 1.05rem; margin: 0; }
      .muted { color: var(--primer-ink-soft, #778); }
      .small { font-size: 0.85rem; }

      .status { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0.75rem;
                border-radius: 999px; font-size: 0.9rem; border: 1px solid var(--primer-border, #ddd); }
      .status .dot { width: 0.6rem; height: 0.6rem; border-radius: 50%; background: var(--primer-ink-soft, #999); }
      .status.is-online .dot { background: #3fb950; }
      .status.is-offline .dot { background: #e0a030; }

      ul.courses { list-style: none; padding: 0; margin: 0; }
      ul.courses li { display: flex; align-items: center; justify-content: space-between; gap: 1rem;
                      padding: 0.7rem 0; border-top: 1px solid var(--primer-border, #eee); }
      ul.courses li:first-child { border-top: 0; }
      .course-meta { min-width: 0; }
      .course-name { font-weight: 500; color: var(--primer-ink, #222); text-decoration: none; }
      .course-name:hover { text-decoration: underline; }
      .course-actions { display: flex; gap: 0.5rem; flex: 0 0 auto; }
      button.act { font-size: 0.85rem; cursor: pointer; padding: 0.35rem 0.8rem; border-radius: 999px;
                   border: 1px solid var(--primer-border, #d9d3c6); background: transparent; color: var(--primer-ink-soft, #667); }
      button.act:hover:not(:disabled) { border-color: var(--primer-accent, #46e); color: var(--primer-ink, #111); }
      button.act.danger:hover:not(:disabled) { border-color: #e0533a; color: #e0533a; }
      button.act:disabled { opacity: 0.6; cursor: default; }

      .search-host { margin-top: 0.3rem; }
      .dl-progress { margin: 0.6rem 0 0; }
      .back-link { color: var(--primer-accent, #5b6ee1); font-weight: 500; text-decoration: none; }
    </style>
  </head>
  <body>
    <main class="dash">
      <div class="dash-head">
        <h1 class="dash-title" id="title">Offline</h1>
        <p class="dash-sub" id="subtitle">Your downloaded courses stay available with no internet connection.</p>
        <p style="margin:0.9rem 0 0">
          <span id="net" class="status"><span class="dot"></span><span id="netLabel">…</span></span>
        </p>
      </div>

      <section class="card">
        <div class="card-head"><h2 id="dlHead">Downloaded courses</h2></div>
        <ul class="courses" id="courseList"><li class="muted">…</li></ul>
      </section>

      <section class="card">
        <div class="card-head"><h2 id="moreHead">Download a course</h2></div>
        <p class="muted small" id="moreHint">Search for a course to save for offline use.</p>
        <div class="search-host" id="courseSearch"></div>
        <p class="dl-progress small muted" id="dlProgress" hidden></p>
      </section>

      <section class="card">
        <div class="card-head"><h2 id="storageHead">Storage</h2></div>
        <p class="muted small" id="storage">—</p>
        <p class="muted small" id="persisted"></p>
      </section>

      <p><a class="back-link" href="/" id="back">← Back to the Primer</a></p>
    </main>

    <script type="module">
      // Framework from the built app bundle (hashed URL via the asset manifest) — no import map.
      const { app } = await (await fetch("/dist/asset-manifest.json")).json();
      const P = await import(app);
      const { initTheme, initLocale, getLocale, loadGraph, t, offline, mountCourseSearch, SEARCH_BOX_CSS } = P;

      offline.registerServiceWorker();
      initTheme();
      initLocale();
      document.body.appendChild(document.createElement("primer-menu"));

      // Localize the static labels.
      const set = (id, key) => { const el = document.getElementById(id); if (el) el.textContent = t(key); };
      set("title", "offline.title");
      set("subtitle", "offline.subtitle");
      set("dlHead", "offline.downloaded");
      set("moreHead", "offline.more");
      set("moreHint", "offline.moreHint");
      set("storageHead", "offline.storage");
      set("back", "offline.back");
      document.getElementById("back").prepend("← ");

      // Network status pill.
      const net = document.getElementById("net");
      const netLabel = document.getElementById("netLabel");
      function paintNet() {
        const on = navigator.onLine;
        net.className = "status " + (on ? "is-online" : "is-offline");
        netLabel.textContent = t(on ? "offline.statusOnline" : "offline.statusOffline");
      }
      paintNet();
      addEventListener("online", () => { paintNet(); renderAll(); });
      addEventListener("offline", paintNet);

      // Graph (for course titles + the course search box); tolerate it being unavailable offline.
      let byId = new Map();
      try { ({ byId } = await loadGraph()); } catch { /* offline & graph not cached — degrade gracefully */ }
      const titleOf = (id) => {
        const e = byId.get(id);
        return (e && (e.titles?.[getLocale()] || e.title)) || id;
      };
      const mb = (n) => (n / 1048576).toFixed(1) + " MB";

      const listEl = document.getElementById("courseList");
      const storageEl = document.getElementById("storage");
      const persistedEl = document.getElementById("persisted");
      const progressEl = document.getElementById("dlProgress");

      // "Download a course" — reuse the shared course search box; selecting one downloads it.
      const style = document.createElement("style");
      style.textContent = SEARCH_BOX_CSS;
      document.head.appendChild(style);
      const searchHost = document.getElementById("courseSearch");
      if (byId.size) {
        mountCourseSearch(searchHost, {
          byId,
          locale: getLocale(),
          onSelect: (id) => startDownload(id),
        });
      } else {
        searchHost.innerHTML = `<span class="muted small">${t("offline.offlineHint")}</span>`;
      }

      async function startDownload(courseId) {
        if (!navigator.onLine) { progressEl.hidden = false; progressEl.textContent = t("offline.offlineHint"); return; }
        progressEl.hidden = false;
        progressEl.textContent = t("course.downloading", { done: 0, total: "…" });
        try {
          await offline.downloadCourse(courseId, (done, total) => {
            progressEl.textContent = t("course.downloading", { done, total });
          });
          progressEl.textContent = t("course.downloaded") + " — " + titleOf(courseId);
        } catch {
          progressEl.textContent = t("course.downloadFailed");
        }
        await renderAll();
      }

      async function renderDownloaded() {
        let courses = [];
        try { courses = await offline.listDownloadedCourses(); } catch { listEl.innerHTML = `<li class="muted">${t("offline.unsupported")}</li>`; return; }
        if (!courses.length) { listEl.innerHTML = `<li class="muted">${t("offline.none")}</li>`; return; }
        listEl.replaceChildren();
        for (const c of courses.sort((a, b) => (b.downloadedAt || 0) - (a.downloadedAt || 0))) {
          const li = document.createElement("li");
          const meta = document.createElement("div");
          meta.className = "course-meta";
          const a = document.createElement("a");
          a.className = "course-name";
          a.href = "/concepts/" + c.id;
          a.textContent = titleOf(c.id);
          const sub = document.createElement("div");
          sub.className = "muted small";
          const parts = [];
          if (c.pageCount) parts.push(t("offline.pages", { count: c.pageCount }));
          if (c.bytes) parts.push(mb(c.bytes));
          sub.textContent = parts.join(" · ");
          meta.append(a, sub);

          const actions = document.createElement("div");
          actions.className = "course-actions";
          const upd = document.createElement("button");
          upd.className = "act";
          upd.textContent = t("offline.update");
          upd.disabled = !navigator.onLine;
          upd.addEventListener("click", async () => {
            upd.disabled = true; upd.textContent = t("offline.updating");
            try { await offline.downloadCourse(c.id, () => {}); } catch {}
            await renderAll();
          });
          const rm = document.createElement("button");
          rm.className = "act danger";
          rm.textContent = t("offline.remove");
          rm.addEventListener("click", async () => {
            if (!confirm(t("offline.removeConfirm"))) return;
            await offline.removeCourse(c.id);
            await renderAll();
          });
          actions.append(upd, rm);
          li.append(meta, actions);
          listEl.appendChild(li);
        }
      }

      async function renderStorage() {
        try {
          const est = await offline.storageEstimate();
          storageEl.textContent = est && est.usage != null
            ? t("offline.usage", { used: mb(est.usage) }) + (est.quota ? " / " + mb(est.quota) : "")
            : "—";
        } catch { storageEl.textContent = "—"; }
        try {
          const persisted = navigator.storage?.persisted ? await navigator.storage.persisted() : false;
          persistedEl.textContent = t(persisted ? "offline.persisted" : "offline.notPersisted");
        } catch { persistedEl.textContent = ""; }
      }

      async function renderAll() { await Promise.all([renderDownloaded(), renderStorage()]); }
      await renderAll();
    </script>
  </body>
</html>
