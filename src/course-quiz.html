<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{coursequiz.docTitle}}</title>
    <meta
      name="description"
      content="One quiz across your whole course — discover what you already know, and recap the concepts you've covered."
    />
    <link rel="icon" href="/images/icons/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/images/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/images/icons/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/images/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#f8f4ec" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="InteractivePrimer.com" />
    <link rel="canonical" href="https://interactiveprimer.com/course-quiz" />

    <!-- Shared synchronous pre-paint: theme + locale, before the stylesheet (built from src/prepaint.ts). -->
    <script src="/dist/prepaint.js"></script>
    <link rel="stylesheet" href="/dist/assets/stix.css" />
    <link rel="stylesheet" href="/css/primer.css" />
    <script src="/dist/analytics.js" defer></script>
    <!-- KaTeX glyph CSS for math in question prompts/options. Framework JS + deps come from the
         built app bundle, imported below via the asset manifest. -->
    <link rel="stylesheet" href="/dist/assets/katex.min.css" />

    <style>
      /* Non-English visitors never see the build-stamped English static text until the module
         script swaps it in (prepaint.js has set <html lang> before paint). `visibility` keeps layout. */
      html:not([lang="en"]) [data-i18n] { visibility: hidden; }
      html.l10n-ready [data-i18n] { visibility: visible; }

      /* Shares course.html / offline.html's dashboard look-and-feel. */
      body { margin: 0; background: var(--primer-bg, #fff); color: var(--primer-ink, #222); }
      .dash { max-width: 46rem; margin: 0 auto; padding: 1.4rem 1.1rem 5rem; }
      .dash, .dash button, .dash a { font-family: var(--primer-font-ui, sans-serif); }
      .dash-head { margin-bottom: 0.9rem; }
      .dash-title { font-family: var(--primer-font-display, serif); font-size: clamp(1.8rem, 4vw, 2.6rem); margin: 0 0 0.25rem; }
      .dash-course { font: inherit; color: inherit; }
      .dash .dash-course a { font: inherit; color: inherit; text-decoration: none; }
      .dash .dash-course a:hover, .dash .dash-course a:focus-visible { text-decoration: underline; }
      .dash-sub { color: var(--primer-ink-soft, #667); margin: 0.35rem 0 0; }
      .card { background: var(--primer-surface, #fff); border: 1px solid var(--primer-border, #ddd);
              border-radius: var(--primer-radius, 0.85rem); box-shadow: var(--primer-shadow-sm);
              padding: 1rem 1.15rem; margin-bottom: 1.2rem; }
      .muted { color: var(--primer-ink-soft, #778); }
      .empty-state { text-align: center; padding: 2rem 1.4rem; }
      .empty-state h2 { margin-top: 0; }
      .empty-state a { color: var(--primer-accent, #5b6ee1); }

      /* Mode chips (Discover / Recap). */
      .cq-modes { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 0 0 0.9rem; }
      .chip.cq-mode { display: inline-flex; align-items: baseline; gap: 0.3rem; padding: 0.4rem 0.85rem;
              border: 1px solid var(--primer-border, #ddd); border-radius: 999px; background: var(--primer-surface, #fff);
              color: var(--primer-ink, #222); cursor: pointer; transition: border-color 0.12s, box-shadow 0.12s; }
      .chip.cq-mode:hover:not(:disabled) { box-shadow: var(--primer-shadow-sm); }
      .chip.cq-mode.is-active { border-color: var(--primer-accent, #6a5cff); box-shadow: 0 0 0 2px var(--primer-ring, #6a5cff44); }
      .chip.cq-mode:disabled { opacity: 0.5; cursor: default; }
      .chip.cq-mode .small { font-size: 0.82rem; }

      /* The progress panel: session stats + the star-distribution bar chart. Two bars per star
         bucket — a muted "at the start" snapshot next to a gold "now" bar — so a session's
         progress is visible as gold rising past grey. */
      /* Pinned while the learner scrolls the stream, so the chart is always in view as it moves.
         The top offset clears the fixed search pill / menu button so they never sit on the panel.
         z-index: JSXGraph gives its HTML text labels/infobox z-index 100, so the panel must beat
         that to keep figures under it — while staying below the fixed chrome (1000+). */
      .cq-panel { position: sticky; top: 3.6rem; z-index: 500; margin: 0 0 1.2rem; }
      .cq-panel h2 { margin: 0 0 0.15rem; font-size: 1.05rem; font-family: var(--primer-font-display, serif); }
      .cq-panel .cq-session { margin: 0 0 0.8rem; }
      .cq-bars { display: flex; align-items: flex-end; gap: 6px; height: 80px;
                 border-bottom: 1px solid var(--primer-border, #ddd); }
      .cq-col { flex: 1 1 0; min-width: 0; display: flex; justify-content: center; align-items: flex-end; gap: 2px; }
      .cq-bar { width: clamp(5px, 38%, 13px); border-radius: 3px 3px 0 0; }
      .cq-bar.start, .cq-swatch.start { background: var(--primer-border, #ccc); }
      /* "now" bars are coloured inline per bucket with the concepts' red→yellow→green confidence
         ramp (ratingColor); the legend swatch shows the ramp as a gradient. */
      .cq-swatch.now { background: linear-gradient(90deg,
        hsl(0, var(--primer-conf-sat, 70%), var(--primer-conf-light, 62%)),
        hsl(60, var(--primer-conf-sat, 70%), var(--primer-conf-light, 62%)),
        hsl(120, var(--primer-conf-sat, 70%), var(--primer-conf-light, 62%))); }
      .cq-labels { display: flex; gap: 6px; margin-top: 3px; }
      .cq-labels span { flex: 1 1 0; min-width: 0; text-align: center; font-size: 0.7rem;
                        color: var(--primer-ink-soft, #778); }
      .cq-legend { display: flex; gap: 1.1rem; margin-top: 0.55rem; font-size: 0.8rem;
                   color: var(--primer-ink-soft, #778); }
      .cq-key { display: inline-flex; align-items: center; gap: 0.35rem; }
      .cq-swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }

      .cq-progress { min-height: 1.2rem; margin: 0 0 0.9rem; }
      .cq-sentinel { height: 2rem; }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main" data-i18n="a11y.skipLink">{{a11y.skipLink}}</a>
    <main class="dash" id="main" tabindex="-1">
      <div id="quiz"><p class="muted" role="status" aria-live="polite" style="padding:2rem 0;text-align:center" data-i18n="coursequiz.loading">{{coursequiz.loading}}</p></div>
    </main>

    <script type="module">
      // Failsafe reveal for the [lang≠en] gate (scheduled before the await so it always fires).
      const revealL10n = () => document.documentElement.classList.add("l10n-ready");
      setTimeout(revealL10n, 2500);

      // Framework from the built app bundle (hashed URL via the asset manifest).
      const { app } = await (await fetch("/dist/asset-manifest.json")).json();
      const { initTheme, initLocale, loadGraph, runProgressMigration, mountCourseQuiz, offline, t } =
        await import(app);

      offline.registerServiceWorker();
      initTheme();
      initLocale();

      document.querySelectorAll("[data-i18n]").forEach((el) => (el.textContent = t(el.getAttribute("data-i18n"))));
      document.title = t("coursequiz.docTitle");
      revealL10n();

      document.body.appendChild(document.createElement("primer-menu"));

      const root = document.getElementById("quiz");
      try {
        await runProgressMigration();
        const { byId } = await loadGraph();
        await mountCourseQuiz(root, { byId });
      } catch (e) {
        console.error(e);
        root.innerHTML =
          `<p class="muted" style="padding:2rem 0;text-align:center">${t("dash.loadError")} ` +
          `<a href="/explore">${t("landing.tileExplore")}</a></p>`;
      }
    </script>
  </body>
</html>
