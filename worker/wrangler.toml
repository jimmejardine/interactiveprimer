# Cloudflare Worker — Interactive Primer cloud sync.
# This is a SEPARATE deploy from the (build-less) static site. See README.md for full setup.

name = "primer-sync"
main = "src/index.js"
compatibility_date = "2025-06-01"

# --- KV: per-user progress docs + transient OTP / rate-limit keys ---------------------------------
# Create with:  wrangler kv namespace create PROGRESS
# then paste the returned id below (replace the placeholder). A `preview_id` is only needed if you
# use `wrangler dev --remote`.
[[kv_namespaces]]
binding = "PROGRESS"
id = "20becff739df4908a0a5e61871b5fb1d"      # <-- REPLACE with the id from `wrangler kv namespace create PROGRESS`
# preview_id = "<KV_PREVIEW_ID>"

# --- Route: serve the API from the site's own origin (same-origin in prod → no CORS needed) --------
# Prefer configuring this in the Cloudflare dashboard, or uncomment and set your zone:
# [[routes]]
# pattern = "interactiveprimer.com/api/*"
# zone_name = "interactiveprimer.com"

# --- Optional plain vars --------------------------------------------------------------------------
# EMAIL_FROM : verified Resend sender, e.g. "Interactive Primer <login@interactiveprimer.com>"
# SITE_ORIGIN: dev-only — the site's origin for CORS reflection, e.g. "http://localhost:8080"
[vars]
# EMAIL_FROM = "Interactive Primer <login@interactiveprimer.com>"
# SITE_ORIGIN = "http://localhost:8080"

# --- Secrets (NEVER commit these — set via `wrangler secret put <NAME>`) ---------------------------
#   wrangler secret put AUTH_SECRET      # long random string; derives uid + signs sessions (KEEP STABLE)
#   wrangler secret put RESEND_API_KEY   # Resend API key for sending the sign-in code email
