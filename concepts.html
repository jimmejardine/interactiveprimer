<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tree of Knowledge — Interactive Primer</title>
    <meta
      name="description"
      content="The whole Interactive Primer tree of knowledge as one interactive graph — every concept and how they build on each other. Drag to rearrange, click a node to open the lesson."
    />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="canonical" href="https://interactiveprimer.com/concepts.html" />

    <!-- Set the theme synchronously, before the stylesheet, so there is no flash of the wrong
         palette. Mirrors pickInitialTheme() in js/theme.js (same as index.html). -->
    <script>
      (function () {
        var t = null;
        try { t = localStorage.getItem("primer:theme"); } catch (e) {}
        if (t !== "light" && t !== "dark" && t !== "fun") {
          t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.dataset.theme = t;
      })();
    </script>
    <!-- Set the locale synchronously too (mirrors pickInitialLocale() in js/i18n.js); initLocale()
         re-applies + strips ?lang= after the module loads. -->
    <script>
      (function () {
        var SUPPORTED = ["en", "es"];
        var l = "";
        try {
          var q = (new URLSearchParams(location.search).get("lang") || "").toLowerCase();
          if (SUPPORTED.indexOf(q) !== -1) {
            l = q;
            try { localStorage.setItem("primer:locale", l); } catch (e) {}
          }
        } catch (e) {}
        if (!l) {
          try { l = localStorage.getItem("primer:locale") || ""; } catch (e) {}
        }
        if (SUPPORTED.indexOf(l) === -1) {
          var langs = (navigator.languages && navigator.languages.length) ? navigator.languages : [navigator.language || "en"];
          l = "en";
          for (var i = 0; i < langs.length; i++) {
            var base = String(langs[i] || "").toLowerCase().split("-")[0];
            if (SUPPORTED.indexOf(base) !== -1) { l = base; break; }
          }
        }
        document.documentElement.lang = l;
      })();
    </script>
    <link rel="stylesheet" href="/css/primer.css" />
    <!-- Cookieless visitor analytics (Cloudflare Web Analytics) — no cookie banner needed. -->
    <script src="/js/analytics.js" defer></script>
    <!-- This page does not load boot.js, so it supplies KaTeX itself: the glyph CSS plus an import
         map resolving the bare "katex" specifier used by <primer-math> (concept-graph typesets a
         node's math title inside a <foreignObject>). Keep the version in step with js/boot.js. -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
    <script type="importmap">
      { "imports": { "katex": "https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.mjs" } }
    </script>
    <style>
      html, body { height: 100%; }
      body { margin: 0; display: flex; flex-direction: column; background: var(--primer-bg, #fff); }
      .cg-header {
        flex: 0 0 auto; padding: 0.85rem 1.1rem 0.6rem;
        font-family: var(--primer-font-ui, sans-serif); color: var(--primer-ink, #111);
      }
      .cg-header h1 { margin: 0 0 0.15rem; font-size: 1.15rem; }
      .cg-header p { margin: 0; font-size: 0.85rem; color: var(--primer-ink-soft, #667); }
      .cg-header a { color: inherit; }
      #cg-host { flex: 1 1 auto; min-height: 0; position: relative; }
      .cg-loading { padding: 1.1rem; font-family: var(--primer-font-ui, sans-serif); color: var(--primer-ink-soft, #667); }
    </style>
  </head>
  <body>
    <header class="cg-header">
      <h1>The Tree of Knowledge</h1>
      <p>
        Every concept and how it builds on the ones before it. Drag a node to rearrange — the graph
        re-settles itself. Scroll to zoom, drag the background to pan, click a node to open its
        lesson. <a href="/">← Home</a>
      </p>
    </header>
    <div id="cg-host"><p class="cg-loading">Loading the tree…</p></div>

    <script type="module">
      import { initTheme } from "/js/theme.js";
      import { initLocale, getLocale } from "/js/i18n.js";
      import { loadGraph } from "/js/graph-data.js";
      import { mountConceptGraph } from "/js/concept-graph.js";
      import "/js/components/primer-menu.js";

      initTheme();
      initLocale();
      document.body.appendChild(document.createElement("primer-menu"));

      const host = /** @type {HTMLElement} */ (document.getElementById("cg-host"));
      loadGraph()
        .then(({ byId }) => {
          host.replaceChildren();
          mountConceptGraph(host, { byId, locale: getLocale() });
        })
        .catch((err) => {
          host.replaceChildren();
          const p = document.createElement("p");
          p.className = "cg-loading";
          p.textContent = "Couldn't load the tree. Run `npm run graph`, then reload.";
          host.appendChild(p);
          console.error("concept graph:", err);
        });
    </script>
  </body>
</html>
